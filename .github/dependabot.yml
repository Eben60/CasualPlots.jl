version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "julia"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    groups:
      all-julia-packages:
        patterns:
          - "*"

  - package-ecosystem: "julia"
    directory: "/docs"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"

  - package-ecosystem: "julia"
    directory: "/test"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
    
  - package-ecosystem: "julia"
    directory: "/test/AgenticTesting"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
  
  - package-ecosystem: "julia"
    directory: "/test/AgenticTesting/test"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"